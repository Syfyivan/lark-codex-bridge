<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: file:; img-src 'self' data: blob: file:; connect-src 'self' data: blob: file: http://127.0.0.1:* http://localhost:*;" />
    <title>Kodama</title>
    <link rel="stylesheet" href="./style.css" />

    <!--
      Rendering stack served locally (run `pnpm run setup` to download into
      vendor/). Cubism Core is proprietary and must ship inside the app; the
      sample model lives under ./models. Load order matters: core -> pixi ->
      the display plugin (which reads window.PIXI).
    -->
    <script src="./vendor/live2dcubismcore.min.js"></script>
    <script src="./vendor/pixi.min.js"></script>
    <script src="./vendor/cubism4.min.js"></script>
  </head>
  <body>
    <canvas id="pet-canvas"></canvas>
    <div id="bubble" class="hidden"></div>
    <!-- surface any load/runtime error as a visible bubble instead of a blank window -->
    <script>
      window.addEventListener('error', function (e) {
        var b = document.getElementById('bubble')
        if (b) {
          b.textContent = '⚠️ ' + (e.message || 'load error')
          b.classList.remove('hidden')
        }
      })
    </script>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
