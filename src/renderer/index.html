<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' https://cubism.live2d.com https://cdn.jsdelivr.net data: blob:; img-src * data: blob:; connect-src *;" />
    <title>Kodama</title>
    <link rel="stylesheet" href="./style.css" />

    <!--
      P0 loads the rendering stack from CDNs so you can SEE a moving pet immediately.
      In P1 we vendor these locally (Cubism Core is proprietary and must ship inside the app).
    -->
    <!-- Live2D Cubism Core (proprietary; official CDN) -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <!-- PixiJS v6 (UMD browser build) -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
    <!-- pixi-live2d-display, Cubism 4 build (registers PIXI.live2d) -->
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
  </head>
  <body>
    <canvas id="pet-canvas"></canvas>
    <div id="bubble" class="hidden"></div>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
